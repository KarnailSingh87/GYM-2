services:
  # Backend Web Service
  - type: web
    name: rfc-gym-backend
    env: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: PORT
        value: 5005
      - key: MONGO_URI
        sync: false # User must provide this in Render Dashboard
      - key: FRONTEND_ORIGIN
        value: https://rfcadmin.onrender.com
      - key: ADMIN_EMAIL
        value: harshvardhan2005.12.16@gmail.com
      - key: ADMIN_PASSWORD
        value: K@rnail0011
      - key: JWT_SECRET
        generateValue: true
      - key: BACKEND_URL
        value: https://gym-2-1xb9.onrender.com

  # Admin Frontend (Static Site)
  - type: web
    name: rfc-gym-admin
    env: static
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: admin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://gym-2-1xb9.onrender.com/api
